<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter's Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <header class="header">
                <p class="eyebrow">Democracy in Action</p>
                <h1>Voter's Registration Form</h1>
                <p class="subtitle">Complete your details and register with pride.</p>
            </header>

            <form action="/submit_registration" method="POST">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="date_of_birth">Date of Birth</label>
                        <input type="date" id="date_of_birth" name="date_of_birth" required>
                    </div>
                    <div class="form-group half">
                        <label for="gender">Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" id="male" name="gender" value="male" required> Male</label>
                            <label><input type="radio" id="female" name="gender" value="female" required> Female</label>
                            <label><input type="radio" id="other" name="gender" value="other" required> Other</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="national_id">National ID Number</label>
                    <input type="text" id="national_id" name="national_id" required>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="address">Email Address</label>
                        <input type="email" id="address" name="address" required>
                    </div>
                    <div class="form-group half">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="county">County</label>
                        <input type="text" id="county" name="county" required>
                    </div>
                    <div class="form-group half">
                        <label for="constituency">Constituency</label>
                        <select id="constituency" name="constituency" required>
                            <option value="">Select Constituency</option>
                            <option value="Jo">Jomvu</option>
                            <option value="Mv">Mvita</option>
                            <option value="Ki">Kisauni</option>
                            <option value="Ch">Changamwe</option>
                            <option value="Ny">Nyali</option>
                            <option value="Li">Likoni</option>
                            <option value="Ko">Kongowea</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Submit Registration</button>
            </form>
        </div>
    </div>
</body>
</html>
