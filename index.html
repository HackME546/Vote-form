<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <header class="header">
                <p class="election-year">Election Year: 2027</p>
                <h1>Voter Registration</h1>
                <p class="subtitle">Complete the form below to register and join our democratic community.</p>
            </header>

            <form action="/submit_registration" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group half">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. +254 700 000 000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="form-group">
                    <p class="section-label">Skills</p>
                    <div class="checkbox-grid">
                        <label><input type="checkbox" name="skills" value="leadership"> Leadership</label>
                        <label><input type="checkbox" name="skills" value="community"> Community Outreach</label>
                        <label><input type="checkbox" name="skills" value="advocacy"> Advocacy</label>
                        <label><input type="checkbox" name="skills" value="education"> Civic Education</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" required>
                        <option value="">Select Country</option>
                        <option value="Kenya">Kenya</option>
                        <option value="Uganda">Uganda</option>
                        <option value="Tanzania">Tanzania</option>
                        <option value="Rwanda">Rwanda</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message Box</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Registration</button>
            </form>
        </div>
    </div>
</body>
</html>
